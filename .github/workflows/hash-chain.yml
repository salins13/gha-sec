name: Hash Chain Verification

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute hash 621919a0
        id: hash_step
        run: |
          VALUE="${{ secrets.MY_SECRET }}github-verified"
          HASH=$(echo -n "$VALUE" | sha256sum | cut -c1-10)
          echo "verify_hash=$HASH" >> $GITHUB_OUTPUT
          echo "$HASH" > verify.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: verify-hash-621919a0
          path: verify.txt
